kind = "mobile"
previewPath = "/"
title = "Shaale-Vikas"
version = "1.0.0"
id = "artifacts/shaale-vikas"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20494

[services.development]
run = "pnpm --filter @workspace/shaale-vikas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shaale-vikas", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/shaale-vikas", "run", "serve" ]

[services.env]
PORT = "20494"
BASE_PATH = "/"
